name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm
      - run: cd frontend && pnpm install
      - run: cd frontend && pnpm tsc --noEmit
